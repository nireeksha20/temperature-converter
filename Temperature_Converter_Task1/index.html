<!doctype html>
<html lang="en">
  <head>
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="body">
    <div class="container" id="container">
      <div class="toggle" onclick="toggleMode()">🌙</div>

      <h2 class="title">🌡️ Temperature Converter</h2>
      <p class="subtitle">Convert temperatures instantly</p>

      <div class="input-group">
        <input type="number" id="tempInput" placeholder="Enter temperature" />
        <select id="unit">
          <option value="celsius">°C</option>
          <option value="fahrenheit">°F</option>
          <option value="kelvin">K</option>
        </select>
      </div>

      <div class="btn-group">
        <button onclick="clearInput()">Clear</button>
        <button onclick="clearHistory()">Clear History</button>
      </div>

      <!-- RESULT -->
      <div id="resultSection" class="result-section">
        <h3>Converted Values</h3>

        <div class="result-box">
          <p id="output1"></p>
          <button onclick="copyText('output1')">📋</button>
        </div>

        <div class="result-box">
          <p id="output2"></p>
          <button onclick="copyText('output2')">📋</button>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="history">
        <h4>History</h4>
        <ul id="historyList"></ul>
      </div>
    </div>

    <div id="toast" class="toast">Copied!</div>

    <script src="script.js"></script>
  </body>
</html>
